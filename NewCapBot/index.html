<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NewBot · Academia IA · NewCap</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #94D500;
    --green-dark: #78b000;
    --black: #111111;
    --gray-100: #F7F7F7;
    --gray-200: #EEEEEE;
    --gray-400: #AAAAAA;
    --gray-600: #666666;
    --white: #FFFFFF;
    --bubble-bot: #F0F0F0;
    --bubble-user: #94D500;
    --header-h: 70px;
    --input-h: 72px;
    --font: 'Poppins', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--gray-100);
    font-family: var(--font);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--white);
    border-bottom: 1.5px solid var(--gray-200);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .bot-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bot-avatar svg { width: 22px; height: 22px; fill: var(--white); }

  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--black); line-height: 1.2; }
  .header-sub  { font-size: 11px; font-weight: 300; color: var(--gray-600); margin-top: 1px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 2px rgba(148,213,0,0.25);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(148,213,0,0.25); }
    50%      { box-shadow: 0 0 0 5px rgba(148,213,0,0.1);  }
  }

  /* ── CHAT ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #chat::-webkit-scrollbar { display: none; }

  /* ── BUBBLES ── */
  .bubble-wrap {
    display: flex; flex-direction: column; gap: 4px;
    animation: fadeUp 0.3s ease both;
  }
  .bubble-wrap.user { align-items: flex-end; }
  .bubble-wrap.bot  { align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.55;
    word-break: break-word;
  }
  .bubble.bot  { background: var(--bubble-bot); color: var(--black); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--bubble-user); color: var(--white); border-bottom-right-radius: 4px; font-weight: 300; }
  .bubble.bot a { color: var(--green-dark); font-weight: 600; text-decoration: none; word-break: break-all; }

  .ts { font-size: 10px; font-weight: 300; color: var(--gray-400); padding: 0 4px; margin-top: 2px; }

  /* ── TYPING ── */
  .typing-bubble {
    background: var(--bubble-bot);
    border-radius: 18px; border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex; gap: 5px; align-items: center;
    max-width: 70px;
    animation: fadeUp 0.2s ease both;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%; background: var(--gray-400);
    animation: typing 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30%          { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INTRO CARD ── */
  .intro-card {
    margin: 8px 0 12px;
    padding: 16px;
    background: linear-gradient(135deg, #f8ffe0, #edffa3);
    border: 1.5px solid #d4f000;
    border-radius: 16px;
    text-align: center;
    animation: fadeUp 0.4s ease both;
  }
  .intro-card .intro-title { font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 4px; }
  .intro-card .intro-sub   { font-size: 12px; font-weight: 300; color: var(--gray-600); line-height: 1.5; }

  /* ── CHIPS ── */
  .chips-wrap {
    display: flex; flex-direction: column; gap: 6px;
    margin: 4px 0 10px;
    animation: fadeUp 0.35s ease both;
  }
  .chips-label {
    font-size: 12px; font-weight: 300; color: var(--gray-600);
    padding: 0 2px; margin-bottom: 2px;
  }
  .chip {
    display: inline-block;
    padding: 9px 14px;
    border-radius: 20px;
    border: 1.5px solid #d4f000;
    background: #f8ffe0;
    font-family: var(--font); font-size: 13px; font-weight: 400; color: var(--black);
    cursor: pointer; text-align: left;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.4;
  }
  .chip:hover  { background: #edffa3; border-color: var(--green); }
  .chip:active { transform: scale(0.97); }

  /* ── INPUT ── */
  #input-area {
    height: var(--input-h);
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: var(--white);
    border-top: 1.5px solid var(--gray-200);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; position: relative; z-index: 10;
  }

  #user-input {
    flex: 1;
    border: 1.5px solid var(--gray-200); border-radius: 24px;
    padding: 10px 18px;
    font-family: var(--font); font-size: 14px; font-weight: 300; color: var(--black);
    background: var(--gray-100); outline: none; resize: none;
    height: 44px; line-height: 1.4; transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--green); background: var(--white); }
  #user-input::placeholder { color: var(--gray-400); }

  #send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--green); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:hover    { background: var(--green-dark); }
  #send-btn:active   { transform: scale(0.94); }
  #send-btn:disabled { background: var(--gray-200); cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: var(--white); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    </div>
    <div class="header-info">
      <div class="header-name">NewBot</div>
      <div class="header-sub">Academia IA · NewCap</div>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="chat">
    <div class="intro-card">
      <div class="intro-title">¿Qué quieres aprender hoy? 🧠</div>
      <div class="intro-sub">Tu asistente de Inteligencia Artificial.<br>Cada conversación, algo nuevo.</div>
    </div>
  </div>

  <div id="input-area">
    <input type="text" id="user-input"
      placeholder="Escribe tu pregunta..."
      autocomplete="off" spellcheck="false">
    <button id="send-btn" onclick="sendMessage()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
// ─────────────────────────────────────────────
//  CONFIGURACIÓN
// ─────────────────────────────────────────────
// La API key y el system prompt están en el servidor (netlify/functions/chat.js).
// Este archivo no contiene ninguna información sensible.
const API_URL = '/.netlify/functions/chat';

// ─────────────────────────────────────────────
//  TEMAS Y FRASES
// ─────────────────────────────────────────────
const TOPICS = [
  "Cómo escribir un prompt que funcione",
  "Por qué la IA no siempre entiende lo que le pides",
  "Cómo darle contexto a la IA",
  "Cómo adoptar IA en un equipo sin experiencia técnica",
  "Herramientas de IA que ya tienes y no sabías",
  "Cómo medir si la IA está funcionando en tu equipo",
  "Qué es la alucinación y cómo evitarla",
  "ChatGPT, Copilot y Claude: ¿cuál es la diferencia?",
  "Qué es un agente de IA",
  "Cómo usar IA sin exponer datos de la empresa",
  "Qué debe saber RRHH antes de usar IA",
  "Cuándo confiar en lo que dice la IA",
];

const CLOSING_PHRASES = [
  "¿Por cuál empezamos?",
  "¿Qué te genera más curiosidad?",
  "¿Alguna de estas te resuena?",
];

function pickRandom(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
}

// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
let conversationHistory = [];
let isTyping = false;

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('user-input').addEventListener('input', () => {
    if (document.getElementById('user-input').value.trim()) removeChips();
  });
  startConversation();
});

async function startConversation() {
  const msg1 = "Hola 👋 Soy NewBot, tu asistente de la Academia IA de NewCap.";
  const msg2 = "¿Cómo te llamas?";
  await sendBotSequence([msg1, msg2]);
  conversationHistory.push({ role: 'assistant', content: msg1 + '\n---\n' + msg2 });
}

// ─────────────────────────────────────────────
//  CHIPS
// ─────────────────────────────────────────────
function showChips() {
  if (document.getElementById('chips-container')) return;
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';
  wrap.id = 'chips-container';

  const label = document.createElement('div');
  label.className = 'chips-label';
  label.textContent = 'Aquí van algunas ideas para empezar — o escríbeme lo que quieras:';
  wrap.appendChild(label);

  pickRandom(TOPICS, 3).forEach(topic => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = topic;
    btn.onclick = () => { removeChips(); document.getElementById('user-input').value = topic; sendMessage(); };
    wrap.appendChild(btn);
  });

  chat.appendChild(wrap);
  scrollBottom();
}

function removeChips() {
  const el = document.getElementById('chips-container');
  if (el) el.remove();
}

function maybeShowChips(text) {
  const triggers = ['qué quieres aprender', 'empezamos', 'aprender hoy', 'por dónde', 'curiosidad'];
  if (triggers.some(t => text.toLowerCase().includes(t))) setTimeout(showChips, 400);
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom() {
  const chat = document.getElementById('chat');
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function addBubble(text, role, showTime = true) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g,'<br>');
  wrap.appendChild(bubble);

  if (showTime) {
    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = getTime();
    wrap.appendChild(ts);
  }
  chat.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const chat = document.getElementById('chat');
  if (document.getElementById('typing-indicator')) return;
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  chat.appendChild(wrap);
  scrollBottom();
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendBotSequence(parts) {
  for (let i = 0; i < parts.length; i++) {
    const text = parts[i].trim();
    if (!text) continue;
    showTyping();
    const delay = Math.min(1800, Math.max(600, text.length * 18));
    await new Promise(r => setTimeout(r, delay));
    hideTyping();
    addBubble(text, 'bot', i === parts.length - 1);
    if (i < parts.length - 1) await new Promise(r => setTimeout(r, 300));
  }
}

// ─────────────────────────────────────────────
//  SEND MESSAGE
// ─────────────────────────────────────────────
async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removeChips();
  input.value = '';
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;
  isTyping = true;

  addBubble(text, 'user');
  conversationHistory.push({ role: 'user', content: text });

  try {
    showTyping();

    // Llama a la función de Netlify — no a Anthropic directamente
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory }),
    });

    if (!response.ok) throw new Error(`Error ${response.status}`);

    const data = await response.json();
    const botText = data.text || '';

    conversationHistory.push({ role: 'assistant', content: botText });

    hideTyping();
    const parts = botText.split(/\n---\n|^---$/m).map(p => p.trim()).filter(Boolean);
    await sendBotSequence(parts);
    maybeShowChips(botText);

  } catch (err) {
    hideTyping();
    addBubble('Ups, tuve un problema de conexión. ¿Puedes intentarlo de nuevo? 🙏', 'bot');
    console.error(err);
  }

  input.disabled = false;
  document.getElementById('send-btn').disabled = false;
  isTyping = false;
  input.focus();
}
</script>
</body>
</html>
